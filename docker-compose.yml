version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.5-alpine
    environment:
      - CLICKHOUSE_USER=chuser
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=chpassword
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://chuser:chpassword@localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  api-service:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
    # The command is already specified in the Dockerfile's CMD instruction.
    # We can add it here to be explicit if needed.
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  # Commented optional web service section for future SSR/container usage
  # web-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.node
  #   env_file:
  #     - .env
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api-service

volumes:
  clickhouse_data:
    driver: local
