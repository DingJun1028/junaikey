services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - otel-collector
    networks: [core]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0@sha256:6e2e2e2b7e2c8e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./ops/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
    networks: [core]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
    networks: [core]

networks:
  core: {}