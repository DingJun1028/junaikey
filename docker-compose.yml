version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    environment:
      - CLICKHOUSE_USER=chuser
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=chpassword
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://chuser:chpassword@localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    # The .env file is used for local development. In CI/CD, environment variables
    # should be injected directly into the environment.
    # env_file:
    #   - .env
    ports:
      - "8080:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
    # The command is already specified in the Dockerfile's CMD instruction.
    # We can add it here to be explicit if needed.
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8080

volumes:
  clickhouse_data:
    driver: local
