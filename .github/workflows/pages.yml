name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'scripts/generate_docs.sh'
      - 'README.md'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Generate documentation
        run: |
          echo "📋 Generating documentation..."
          
          # Make script executable
          chmod +x scripts/generate_docs.sh
          
          # Run documentation generation
          scripts/generate_docs.sh
          
          echo "✅ Documentation generated"

      - name: Verify generated files
        run: |
          echo "📁 Checking generated documentation files..."
          
          if [ -f "docs/site/index.md" ]; then
            echo "✅ index.md exists"
            echo "📊 Content preview:"
            head -10 docs/site/index.md
          else
            echo "❌ index.md not found"
            exit 1
          fi
          
          if [ -f "docs/site/index.html" ]; then
            echo "✅ index.html exists"
          else
            echo "❌ index.html not found"
            exit 1
          fi
          
          echo "📦 Files in docs/site/:"
          ls -la docs/site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: 'docs/site'

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Display deployment URL
        run: |
          echo "🚀 Documentation deployed successfully!"
          echo "📖 View at: ${{ steps.deployment.outputs.page_url }}"